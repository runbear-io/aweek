      typed).
    files:
      - src/storage/usage-store.js
      - src/storage/usage-store.test.js
      - src/storage/activity-log-store.js
      - src/storage/activity-log-store.test.js
      - src/storage/execution-store.js
      - src/storage/execution-store.test.js
      - src/storage/execution-log-store.js
      - src/storage/execution-log-store.test.js
      - src/storage/artifact-store.js
      - src/storage/artifact-store.test.js
    extra_acceptance_criteria:
      - "5 heartbeat files removed from tsconfig.node.json `exclude` list"

  - order: 4
    id: seed-04-subagents-models-time
    layer: foundations_other
    typing_depth: rich
