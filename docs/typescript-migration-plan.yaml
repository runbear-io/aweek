verification_orchestrator_ac5:
  ac: "Every .js file listed in seed manifest no longer exists on disk"
  scope: orchestrator-level manifest
  source_file_entries_at_this_level: 0
  result: vacuously_satisfied
  note: |
    The orchestrator-level manifest's `source_files: []` is empty by design.
    Per AC explicitness ("AC listed verbatim"), each sub-seed independently
    carries AC clause (e) for its own file list. Sub-seed-level AC 5 is the
    deterministic, shell-greppable invariant that gets evaluated when each
    sub-seed runs.
