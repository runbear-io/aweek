orchestrator_id: orch_dc5868477e5d
goal: |
  Migrate all remaining .js backend files to TypeScript via sub-batched
  orchestrator seeds (~10-15 files each), sequentially ordered by dependency
  layer (storage -> subagents -> skills -> serve -> glue), with foundation
  directories getting rich types and glue directories getting mechanical
  renames.

# This is the orchestrator-level manifest. It does NOT directly enumerate any
# .js source files. Instead, it lists sub-seeds in strict execution order. Each
# sub-seed carries its own file manifest and its own AC clause (e) which is
# what actually verifies "no .js file in seed manifest exists on disk" against
# that specific sub-batch.
#
# Therefore the orchestrator-level AC 5 ("Every .js file listed in seed
# manifest no longer exists on disk") is vacuously satisfied at this level:
# the source-file list is empty here. Each sub-seed below is independently
# responsible for verifying its own file manifest is consumed.

source_files: []   # orchestrator-level manifest contains no direct file entries

execution_mode: strictly_sequential

verbatim_acceptance_criteria_per_subseed:
  - id: a
    text: "`pnpm typecheck` exit 0"
  - id: b
    text: "`pnpm test` exit 0"
  - id: c
    text: "`pnpm test:spa` exit 0"
  - id: d
    text: "`pnpm build` exit 0"
  - id: e
    text: "Every `.js` file in the seed's manifest no longer exists on disk"
  - id: f_foundation_only
    text: "Zero NEW `as any` introduced (grep the seed's diff) — applies to foundation seeds (storage / subagents / models / time)"

global_constraints:
  - "tsc --noEmit -p tsconfig.node.json must stay green at end of each seed"
  - "pnpm test + pnpm test:spa + pnpm build all green at end of each seed"
  - "No widening of strict flags"
  - "Do not touch src/serve/spa/components/ui/*"
  - "10-15 files per seed (counting source + colocated .test as 2 files)"
  - "Target <100 tsc errors mid-run per seed"
  - "Foundation seeds: zero new `as any`"
  - "Glue seeds: mechanical rename"
  - "Strictly sequential execution"
  - "Each .test.js migrates with source sibling (same seed)"
  - "Heartbeat re-inclusion folded into the final storage seed"
  - "Entry points (bin/aweek.js, scripts/dev.mjs, scripts/build.mjs, src/index.js) in final glue seed"
  - "AC listed verbatim in every sub-seed prompt"

subseeds:
  - order: 1
    id: seed-01-storage-A
    layer: storage
    typing_depth: rich
    file_count: 10
    rationale: "Foundation storage modules: agents, helpers, env, config, goals."
    files:
      - src/storage/agent-store.js
      - src/storage/agent-store.test.js
      - src/storage/agent-helpers.js
      - src/storage/agent-helpers.test.js
      - src/storage/agent-env-store.js
      - src/storage/agent-env-store.test.js
      - src/storage/config-store.js
      - src/storage/config-store.test.js
      - src/storage/goal-store.js
      - src/storage/goal-store.test.js

  - order: 2
    id: seed-02-storage-B
    layer: storage
    typing_depth: rich
    file_count: 10
    rationale: "Foundation storage modules: inbox + plan family."
    files:
      - src/storage/inbox-store.js
      - src/storage/inbox-store.test.js
      - src/storage/weekly-plan-store.js
      - src/storage/weekly-plan-store.test.js
      - src/storage/monthly-plan-store.js
      - src/storage/monthly-plan-store.test.js
      - src/storage/plan-markdown-store.js
      - src/storage/plan-markdown-store.test.js
      - src/storage/plan-interview-store.js
      - src/storage/plan-interview-store.test.js

  - order: 3
    id: seed-03-storage-C-final
    layer: storage
    typing_depth: rich
    file_count: 10
    rationale: |
      FINAL storage seed: usage / activity-log / execution / execution-log /
      artifact stores. Also re-includes the 5 heartbeat files in
